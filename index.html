<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>the wall</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Eater&family=Space+Mono:wght@400;700&display=swap');

  :root{
    --bg: #050304;
    --blood: #8a0d1f;
    --blood-bright: #c4112b;
    --ash: #2b1416;
    --bone: #e8e0df;
    --line: rgba(255,255,255,0.06);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin:0;
    padding:0;
    min-height:100%;
    background: var(--bg);
    font-family: 'Space Mono', monospace;
    color: var(--bone);
  }

  body{ overflow-x:hidden; }

  .gloom{
    position:fixed;
    inset:0;
    z-index:-2;
    background:
      radial-gradient(circle at 50% 38%, rgba(138,13,31,0.22), transparent 55%),
      radial-gradient(circle at 15% 90%, rgba(40,5,10,0.6), transparent 60%),
      radial-gradient(circle at 88% 95%, rgba(40,5,10,0.6), transparent 60%),
      var(--bg);
    animation: candleFlicker 6s ease-in-out infinite;
  }

  @keyframes candleFlicker{
    0%, 100% { filter: brightness(1); }
    18% { filter: brightness(0.92); }
    32% { filter: brightness(1.04); }
    45% { filter: brightness(0.88); }
    60% { filter: brightness(1); }
    74% { filter: brightness(0.95); }
    88% { filter: brightness(1.03); }
  }

  .vignette{
    position:fixed;
    inset:0;
    z-index: 40;
    pointer-events:none;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.88) 100%);
  }

  .grain{
    position:fixed;
    inset:-10%;
    pointer-events:none;
    z-index: 30;
    opacity: 0.16;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    animation: grainDrift 1.1s steps(3) infinite;
    mix-blend-mode: overlay;
  }

  @keyframes grainDrift{
    0%{ transform: translate(0,0); }
    50%{ transform: translate(-1.5%,1%); }
    100%{ transform: translate(1%,-1.5%); }
  }

  .sigils{
    position:fixed;
    inset:0;
    z-index: 1;
    pointer-events:none;
    opacity: 0;
    transition: opacity 1.2s ease;
  }

  .sigils.show{ opacity: 1; }

  .sigil{
    position:absolute;
    fill:none;
    stroke: var(--blood-bright);
    opacity: 0.32;
    animation: sigilTurn 70s linear infinite, sigilPulse 5s ease-in-out infinite;
  }

  .sigil.center{
    top:50%; left:50%;
    width: min(60vmin, 560px);
    height: min(60vmin, 560px);
    transform: translate(-50%,-50%);
    opacity: 0.28;
    stroke-width: 0.7;
  }

  @keyframes sigilPulse{
    0%, 100% { opacity: 0.22; }
    50% { opacity: 0.42; }
  }

  @keyframes sigilTurn{
    from{ transform: translate(-50%,-50%) rotate(0deg); }
    to{ transform: translate(-50%,-50%) rotate(360deg); }
  }

  .sigil.small{
    width: 64px; height: 64px;
    stroke-width: 1.8;
    opacity: 0.38;
    animation: sigilTurnRev 50s linear infinite, sigilPulse 4s ease-in-out infinite;
  }

  @keyframes sigilTurnRev{
    from{ transform: rotate(0deg); }
    to{ transform: rotate(-360deg); }
  }

  .sigil.s1{ top: 8%;  left: 6%;  }
  .sigil.s2{ top: 12%; left: 88%; width: 48px; height:48px; }
  .sigil.s3{ top: 80%; left: 9%;  width: 56px; height:56px; }
  .sigil.s4{ top: 84%; left: 86%; }
  .sigil.s5{ top: 6%;  left: 48%; width: 40px; height:40px; }
  .sigil.s6{ top: 92%; left: 50%; width: 44px; height:44px; }
  .sigil.s7{ top: 45%; left: 4%;  width: 50px; height:50px; }
  .sigil.s8{ top: 50%; left: 93%; width: 50px; height:50px; }

  .scene{
    position:relative;
    z-index: 10;
    width: 100%;
    min-height: 100vh;
    display:flex;
    flex-direction: column;
    align-items:center;
    justify-content:center;
    padding: 6vh 5vw;
  }

  .hidden{ display:none; }

  .brand{
    font-family: 'Eater', cursive;
    font-size: clamp(1.8rem, 6vw, 2.6rem);
    letter-spacing: 0.04em;
    color: #d8cfce;
    text-shadow: 0 0 16px rgba(138,13,31,0.5);
    margin-bottom: 0.3em;
  }

  .sub{
    color: rgba(232,224,223,0.4);
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 2.2rem;
    text-align:center;
  }

  .menu-card{
    width: 100%;
    max-width: 360px;
    display:flex;
    flex-direction: column;
    gap: 0.9rem;
  }

  .field{
    display:flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .field label{
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(232,224,223,0.45);
  }

  .field input{
    background: rgba(20,9,11,0.7);
    border: 1px solid rgba(138,13,31,0.4);
    border-radius: 12px;
    padding: 0.85em 1em;
    color: var(--bone);
    font-family: 'Space Mono', monospace;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
  }

  .field input::placeholder{ color: rgba(232,224,223,0.25); }

  .field input:focus{
    border-color: var(--blood-bright);
    box-shadow: 0 0 16px rgba(196,17,43,0.25);
  }

  .btn-row{
    display:flex;
    gap: 0.7rem;
    margin-top: 0.6rem;
  }

  .btn{
    flex:1;
    background: transparent;
    border: 1px solid rgba(232,224,223,0.18);
    color: rgba(232,224,223,0.55);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0.85em 1em;
    border-radius: 999px;
    cursor:pointer;
    transition: color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
  }

  .btn:hover{
    color: var(--blood-bright);
    border-color: var(--blood-bright);
    box-shadow: 0 0 16px rgba(196,17,43,0.3);
  }

  .btn.primary{
    background: linear-gradient(160deg, rgba(138,13,31,0.5), rgba(40,5,10,0.5));
    border-color: rgba(196,17,43,0.55);
    color: var(--bone);
  }

  .btn.primary:hover{ box-shadow: 0 0 24px rgba(196,17,43,0.45); }

  .skip-link{
    margin-top: 1.4rem;
    background:none;
    border:none;
    color: rgba(232,224,223,0.35);
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-decoration: underline;
    cursor:pointer;
  }

  .skip-link:hover{ color: var(--blood-bright); }

  .status-msg{
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: rgba(196,17,43,0.85);
    text-align:center;
    min-height: 1.2em;
  }

  .grid-scene{
    justify-content: flex-start;
    padding-top: 8vh;
  }

  .search-wrap{
    width: 100%;
    max-width: 420px;
    margin-bottom: 2.2rem;
  }

  .search-wrap input{
    width: 100%;
    background: rgba(20,9,11,0.7);
    border: 1px solid rgba(138,13,31,0.4);
    border-radius: 999px;
    padding: 0.85em 1.3em;
    color: var(--bone);
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
  }

  .search-wrap input::placeholder{ color: rgba(232,224,223,0.3); }

  .search-wrap input:focus{
    border-color: var(--blood-bright);
    box-shadow: 0 0 18px rgba(196,17,43,0.3);
  }

  .box-grid{
    display:flex;
    flex-wrap: wrap;
    gap: 4vw;
    justify-content:center;
    max-width: 1000px;
    width: 100%;
  }

  .box{
    position:relative;
    width: 160px;
    height: 160px;
    border-radius: 20px;
    background: linear-gradient(160deg, #150709, #060203);
    border: 1px solid rgba(138,13,31,0.35);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    isolation: isolate;
    transition: border-color 0.5s ease, box-shadow 0.5s ease;
  }

  .box:focus-visible{
    outline: 1px solid var(--blood-bright);
    outline-offset: 4px;
  }

  .box:hover{
    border-color: rgba(196,17,43,0.6);
    box-shadow: 0 0 28px rgba(138,13,31,0.35);
  }

  .box-glow{
    position:absolute;
    inset:-2px;
    border-radius: 22px;
    z-index:-1;
    filter: blur(16px);
    opacity: 0.35;
    background: radial-gradient(circle at 50% 50%, var(--blood), transparent 70%);
    transition: opacity 0.5s ease;
  }

  .box:hover .box-glow{ opacity: 0.7; }

  .box-name{
    font-family: 'Eater', cursive;
    font-weight: 400;
    font-size: 1.7rem;
    letter-spacing: 0.04em;
    text-transform: lowercase;
    color: #d8cfce;
    user-select:none;
    text-align:center;
    padding: 0 0.5em;
    word-break: break-word;
    text-shadow: 0 0 10px rgba(138,13,31,0.5), 0 2px 0 rgba(0,0,0,0.6);
  }

  .empty-msg{
    color: rgba(232,224,223,0.3);
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-align:center;
    margin-top: 2rem;
  }

  .grid-footer{ margin-top: 2.6rem; }

  .reveal{ text-align:center; }

  .reveal-text{
    font-family: 'Eater', cursive;
    font-weight: 400;
    font-size: clamp(1.6rem, 5.5vw, 2.6rem);
    line-height: 1.2;
    color: #cfc4c3;
    letter-spacing: 0.03em;
    max-width: 90vw;
    word-break: break-word;
  }

  .reveal-text .target{
    display:block;
    font-size: clamp(2.1rem, 8vw, 4rem);
    margin-top: 0.2em;
    color: var(--bone);
    text-shadow:
      0 0 18px rgba(196,17,43,0.55),
      0 0 46px rgba(138,13,31,0.35),
      0 3px 0 rgba(0,0,0,0.7);
    animation: emberPulse 4.5s ease-in-out infinite;
  }

  @keyframes emberPulse{
    0%, 100% { text-shadow: 0 0 18px rgba(196,17,43,0.55), 0 0 46px rgba(138,13,31,0.35), 0 3px 0 rgba(0,0,0,0.7); }
    50% { text-shadow: 0 0 26px rgba(196,17,43,0.8), 0 0 64px rgba(138,13,31,0.5), 0 3px 0 rgba(0,0,0,0.7); }
  }

  .back-btn{
    margin-top: 2rem;
    background: transparent;
    border: 1px solid rgba(232,224,223,0.18);
    color: rgba(232,224,223,0.45);
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.7em 1.4em;
    border-radius: 999px;
    cursor:pointer;
    transition: color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
  }

  .back-btn:hover{
    color: var(--blood-bright);
    border-color: var(--blood-bright);
    box-shadow: 0 0 16px rgba(196,17,43,0.3);
  }

  @media (prefers-reduced-motion: reduce){
    .grain, .gloom, .sigil{ animation: none !important; }
  }

  @media (max-width: 480px){
    .box{ width: 30vw; height: 30vw; min-width:120px; min-height:120px; }
    .box-name{ font-size: 1.3rem; }
  }
</style>
</head>
<body>

<div class="gloom"></div>

<div class="sigils" id="sigils">
  <svg class="sigil center" viewBox="0 0 100 100" aria-hidden="true">
    <circle cx="50" cy="50" r="46" stroke-width="0.5"/>
    <polygon points="50,8 67,82 8,36 92,36 33,82" stroke-width="0.5"/>
  </svg>
  <svg class="sigil small s1" viewBox="0 0 24 24" aria-hidden="true"><line x1="12" y1="2" x2="12" y2="22"/><line x1="5" y1="7" x2="19" y2="7"/></svg>
  <svg class="sigil small s4" viewBox="0 0 24 24" aria-hidden="true"><line x1="12" y1="2" x2="12" y2="22"/><line x1="5" y1="7" x2="19" y2="7"/></svg>
  <svg class="sigil small s2" viewBox="0 0 100 100" aria-hidden="true"><polygon points="50,8 67,82 8,36 92,36 33,82"/></svg>
  <svg class="sigil small s3" viewBox="0 0 100 100" aria-hidden="true"><polygon points="50,8 67,82 8,36 92,36 33,82"/></svg>
  <svg class="sigil small s5" viewBox="0 0 100 60" aria-hidden="true"><path d="M5,30 Q50,0 95,30 Q50,60 5,30 Z" stroke-width="2"/><circle cx="50" cy="30" r="10" stroke-width="2"/></svg>
  <svg class="sigil small s6" viewBox="0 0 100 100" aria-hidden="true"><circle cx="50" cy="50" r="40" stroke-width="2"/><line x1="50" y1="14" x2="50" y2="86"/><line x1="14" y1="50" x2="86" y2="50"/></svg>
  <svg class="sigil small s7" viewBox="0 0 100 100" aria-hidden="true"><circle cx="50" cy="50" r="42" stroke-width="1.5"/><circle cx="50" cy="50" r="28" stroke-width="1"/><path d="M50,50 L50,18 M50,50 L78,66 M50,50 L22,66" stroke-width="1.5"/></svg>
  <svg class="sigil small s8" viewBox="0 0 100 100" aria-hidden="true"><path d="M50,5 L58,40 L92,30 L62,52 L80,82 L50,62 L20,82 L38,52 L8,30 L42,40 Z" stroke-width="1.5"/></svg>
</div>

<!-- SCENE 1: MENU -->
<section class="scene" id="menuScene">
  <div class="brand">the wall</div>
  <div class="sub">leave your mark</div>
  <div class="menu-card">
    <div class="field">
      <label for="nameInput">your name</label>
      <input id="nameInput" type="text" maxlength="24" placeholder="e.g. xail">
    </div>
    <div class="field">
      <label for="msgInput">what it says when opened</label>
      <input id="msgInput" type="text" maxlength="80" placeholder="e.g. i love carina">
    </div>
    <div class="status-msg" id="menuStatus"></div>
    <div class="btn-row">
      <button class="btn primary" id="doneBtn">done</button>
    </div>
    <button class="skip-link" id="skipBtn">skip — just look around</button>
  </div>
</section>

<!-- SCENE 2: GRID -->
<section class="scene grid-scene hidden" id="gridScene">
  <div class="brand">the wall</div>
  <div class="search-wrap">
    <input id="searchInput" type="text" placeholder="search names...">
  </div>
  <div class="box-grid" id="boxGrid"></div>
  <div class="empty-msg hidden" id="emptyMsg">no names match.</div>
  <div class="grid-footer">
    <button class="btn" id="addMoreBtn">+ add another</button>
  </div>
</section>

<!-- SCENE 3: REVEAL -->
<section class="scene reveal hidden" id="revealScene">
  <div class="reveal-text" id="revealText">
    <span class="target" id="revealTarget">___</span>
  </div>
  <button class="back-btn" id="backBtn">‹ return to the wall</button>
</section>

<div class="grain"></div>
<div class="vignette"></div>

<!-- Supabase (free tier) for shared storage across everyone visiting the site -->
<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  // ====== SETUP REQUIRED ======
  // Paste your own Supabase project URL and anon key below.
  // See the setup notes provided alongside this file.
  const SUPABASE_URL = "https://vbbyrmvfrtmsfyjrmknw.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_IHQXpo29qIoFMJE6QjvUvg_-29Ye8wq";

  let supabase = null;
  let entries = [];
  let supabaseReady = false;

  try {
    if (SUPABASE_URL !== "YOUR_SUPABASE_URL" && SUPABASE_ANON_KEY !== "YOUR_SUPABASE_ANON_KEY"){
      supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      supabaseReady = true;
    }
  } catch (e) {
    console.warn("Supabase not configured yet:", e);
  }

  const menuScene = document.getElementById('menuScene');
  const gridScene = document.getElementById('gridScene');
  const revealScene = document.getElementById('revealScene');
  const nameInput = document.getElementById('nameInput');
  const msgInput = document.getElementById('msgInput');
  const doneBtn = document.getElementById('doneBtn');
  const skipBtn = document.getElementById('skipBtn');
  const addMoreBtn = document.getElementById('addMoreBtn');
  const backBtn = document.getElementById('backBtn');
  const menuStatus = document.getElementById('menuStatus');
  const boxGrid = document.getElementById('boxGrid');
  const emptyMsg = document.getElementById('emptyMsg');
  const searchInput = document.getElementById('searchInput');
  const revealTarget = document.getElementById('revealTarget');
  const sigils = document.getElementById('sigils');

  function showScene(scene){
    [menuScene, gridScene, revealScene].forEach(s => s.classList.add('hidden'));
    scene.classList.remove('hidden');
  }

  function renderGrid(filter = ""){
    boxGrid.innerHTML = "";
    const f = filter.trim().toLowerCase();
    const filtered = entries.filter(e => e.name.toLowerCase().includes(f));

    if (filtered.length === 0){
      emptyMsg.classList.remove('hidden');
    } else {
      emptyMsg.classList.add('hidden');
    }

    filtered.forEach(entry => {
      const box = document.createElement('div');
      box.className = 'box';
      box.tabIndex = 0;
      box.setAttribute('role', 'button');
      box.setAttribute('aria-label', 'reveal message for ' + entry.name);

      const glow = document.createElement('div');
      glow.className = 'box-glow';

      const nameSpan = document.createElement('span');
      nameSpan.className = 'box-name';
      nameSpan.textContent = entry.name;

      box.appendChild(glow);
      box.appendChild(nameSpan);

      const open = () => {
        revealTarget.textContent = entry.message;
        sigils.classList.add('show');
        showScene(revealScene);
      };

      box.addEventListener('click', open);
      box.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' '){
          e.preventDefault();
          open();
        }
      });

      boxGrid.appendChild(box);
    });
  }

  async function fetchEntries(){
    const { data, error } = await supabase
      .from('wall_entries')
      .select('name, message')
      .order('created_at', { ascending: false });

    if (error){
      console.error(error);
      menuStatus.textContent = "couldn't load the wall — check your connection.";
      return;
    }
    entries = data;
    renderGrid(searchInput.value);
  }

  function listenForEntries(){
    if (!supabaseReady){
      menuStatus.textContent = "storage not connected yet — see setup notes.";
      return;
    }

    fetchEntries();

    // realtime: refetch whenever any row is inserted
    supabase
      .channel('wall_entries_changes')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'wall_entries' }, () => {
        fetchEntries();
      })
      .subscribe();
  }

  async function submitEntry(){
    const name = nameInput.value.trim();
    const message = msgInput.value.trim();

    if (!name || !message){
      menuStatus.textContent = "fill in both fields first.";
      return;
    }

    if (!supabaseReady){
      menuStatus.textContent = "storage not connected — see setup notes in the file.";
      return;
    }

    doneBtn.disabled = true;
    menuStatus.textContent = "carving it in...";

    const { error } = await supabase
      .from('wall_entries')
      .insert([{ name, message }]);

    if (error){
      console.error(error);
      menuStatus.textContent = "something went wrong — try again.";
    } else {
      nameInput.value = "";
      msgInput.value = "";
      menuStatus.textContent = "";
      showScene(gridScene);
    }
    doneBtn.disabled = false;
  }

  doneBtn.addEventListener('click', submitEntry);
  skipBtn.addEventListener('click', () => showScene(gridScene));
  addMoreBtn.addEventListener('click', () => showScene(menuScene));
  backBtn.addEventListener('click', () => {
    sigils.classList.remove('show');
    showScene(gridScene);
  });

  searchInput.addEventListener('input', (e) => renderGrid(e.target.value));

  [nameInput, msgInput].forEach(el => {
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') submitEntry();
    });
  });

  listenForEntries();
</script>

</body>
</html>
